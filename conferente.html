<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel do Conferente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{font-family:Arial;background:#eef2f6;padding:20px}
        .card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 3px 10px rgba(0,0,0,0.08)}
        input,select,button{width:100%;padding:8px;margin:5px 0}
        button{background:#003366;color:white;border:none}
        h2{text-align:center}
    </style>
</head>
<body>

<h2>Painel Operacional - Conferente</h2>

<div class="card">

    <input type="text" id="numero" placeholder="Número do Container">

    <select id="tipo">
        <option value="">Tipo</option>
        <option>Vazio</option>
        <option>Cheio</option>
    </select>

    <select id="movimento">
        <option value="">Movimento</option>
        <option>Entrada</option>
        <option>Saída</option>
    </select>

    <select id="empresa">
        <option value="">Empresa</option>
        <option>Login</option>
        <option>Aliança</option>
    </select>

    <select id="prazo">
        <option value="">Prazo</option>
        <option>Deadline</option>
        <option>Demurrage</option>
    </select>

    <input type="text" id="localizacao" placeholder="Localização no Pátio">

    <input type="text" id="motorista" placeholder="Motorista (apenas saída)">

    <input type="file" id="foto" accept="image/*" capture="environment">

    <button onclick="registrar()">Registrar</button>

</div>

<script>

    let banco = JSON.parse(localStorage.getItem("patio_db")) || [];

    function salvar(){
        localStorage.setItem("patio_db",JSON.stringify(banco));
    }

    function registrar(){

        let numero = numeroInput.value.toUpperCase().trim();
        let tipo = tipoInput.value;
        let movimento = movimentoInput.value;
        let empresa = empresaInput.value;
        let prazo = prazoInput.value;
        let localizacao = localizacaoInput.value.trim();
        let motorista = motoristaInput.value.trim();
        let foto = fotoInput.files[0];

        if(!numero || !tipo || !movimento || !localizacao){
            alert("Preencha todos os campos obrigatórios");
            return;
        }

        if(!foto){
            alert("Foto obrigatória do container");
            return;
        }

        let reader = new FileReader();

        reader.onload=function(e){

            banco.push({
                id:Date.now(),
                numero,
                tipo,
                movimento,
                empresa:movimento==="Entrada"?empresa:"",
                prazo,
                localizacao,
                motorista:movimento==="Saída"?motorista:"",
                data:new Date().toLocaleString(),
                foto:e.target.result
            });

            salvar();
            alert("Registrado com sucesso");
            document.querySelectorAll("input,select").forEach(el=>el.value="");
        }

        reader.readAsDataURL(foto);
    }

    const numeroInput = document.getElementById("numero");
    const tipoInput = document.getElementById("tipo");
    const movimentoInput = document.getElementById("movimento");
    const empresaInput = document.getElementById("empresa");
    const prazoInput = document.getElementById("prazo");
    const localizacaoInput = document.getElementById("localizacao");
    const motoristaInput = document.getElementById("motorista");
    const fotoInput = document.getElementById("foto");

</script>

</body>
</html>
